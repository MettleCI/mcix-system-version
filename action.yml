name: 'MCIX System Version Action'
author: 'Data Migrators Pty Ltd'
description: 'Retrieve details on the MCIX container providing DataStage CI/CD capabilities for IBM Software Hub (Cloud Pak)'
branding:
  icon: 'info'
  color: 'blue'

outputs:
  return-code:
    description: 'The return code of the command'

runs:
  using: 'docker'
  image: 'Dockerfile' # Refers to the Dockerfile in the current directory
  env:
    PARAM_ACTION_DETAILS: ${{ inputs.action-details }}
